<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votación - Fracciones</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:linear-gradient(135deg,#0F2040 0%,#1C3A6E 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:#fff;border-radius:20px;padding:40px;max-width:600px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
h1{color:#0F2040;font-size:32px;margin-bottom:10px;text-align:center}
.subtitle{color:#666;text-align:center;margin-bottom:30px;font-size:18px}
.barra{margin:20px 0}
.question{font-size:20px;color:#333;margin-bottom:15px;font-weight:600}
.options{display:flex;flex-direction:column;gap:15px}
.option{background:#f5f5f5;border:3px solid #ddd;border-radius:12px;padding:20px;cursor:pointer;transition:all 0.3s;font-size:24px;display:flex;align-items:center;gap:15px}
.option:hover{background:#EEF5FB;border-color:#2E75B6;transform:translateY(-2px)}
.option.selected{background:#0F2040;color:#fff;border-color:#0F2040}
.indicator{width:30px;height:30px;border-radius:50%;border:3px solid currentColor;display:flex;align-items:center;justify-content:center}
.option.selected .indicator{background:#fff}
#status{margin-top:20px;padding:15px;border-radius:10px;text-align:center;font-size:18px;font-weight:600;display:none}
#status.success{background:#d4edda;color:#155724;display:block}
#status.error{background:#f8d7da;color:#721c24;display:block}
.already{background:#fff3cd;color:#856404;padding:20px;border-radius:10px;text-align:center;margin-top:20px;font-size:18px}
</style>
</head>
<body>
<div class="container">
  <h1>🗳️ Votación en Vivo</h1>
  <div class="subtitle">I.E. Merceditas Gómez Martínez - Fracciones</div>
  
  <div id="voting-form">
    <div class="barra">
      <svg viewBox="0 0 220 66" width="100%" height="66" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="41.2" height="60" rx="4" fill="#6C3483" stroke="#fff" stroke-width="2"/>
        <rect x="47.2" y="3" width="41.2" height="60" rx="4" fill="#6C3483" stroke="#fff" stroke-width="2"/>
        <rect x="91.4" y="3" width="41.2" height="60" rx="4" fill="#6C3483" stroke="#fff" stroke-width="2"/>
        <rect x="135.6" y="3" width="41.2" height="60" rx="4" fill="#DEDBD3" stroke="#fff" stroke-width="2"/>
        <rect x="179.8" y="3" width="41.2" height="60" rx="4" fill="#DEDBD3" stroke="#fff" stroke-width="2"/>
      </svg>
    </div>
    
    <div class="question">¿Qué fracción representa esta barra?</div>
    
    <div class="options">
      <div class="option" onclick="vote('a')">
        <div class="indicator"></div>
        <span><strong>A)</strong> 3/5 — tres quintos</span>
      </div>
      <div class="option" onclick="vote('b')">
        <div class="indicator"></div>
        <span><strong>B)</strong> 5/3 — cinco tercios</span>
      </div>
      <div class="option" onclick="vote('c')">
        <div class="indicator"></div>
        <span><strong>C)</strong> 2/5 — dos quintos</span>
      </div>
    </div>
  </div>
  
  <div id="status"></div>
  
  <div id="already-voted" style="display:none">
    <div class="already">
      ✅ <strong>¡Gracias por votar!</strong><br>
      Ya registraste tu respuesta en esta sesión.
    </div>
  </div>
</div>

<script>
const FB_URL='https://fracciones-merceditas-default-rtdb.firebaseio.com';
const SESSION_KEY='sesion1_'+new Date().toISOString().slice(0,10);

// Verificar si ya votó
if(localStorage.getItem('voted_'+SESSION_KEY)){
  document.getElementById('voting-form').style.display='none';
  document.getElementById('already-voted').style.display='block';
}

async function vote(opt){
  const status=document.getElementById('status');
  
  // Marcar como votado
  localStorage.setItem('voted_'+SESSION_KEY,'1');
  
  // Actualizar UI
  document.querySelectorAll('.option').forEach((el,idx)=>{
    const letters=['a','b','c'];
    if(letters[idx]===opt)el.classList.add('selected');
    el.style.pointerEvents='none';
  });
  
  // Enviar a Firebase
  try{
    const res=await fetch(`${FB_URL}/votes/${SESSION_KEY}.json`);
    let data=res.ok?await res.json():null;
    if(!data)data={a:0,b:0,c:0};
    
    data[opt]=(data[opt]||0)+1;
    
    const patch=await fetch(`${FB_URL}/votes/${SESSION_KEY}.json`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });
    
    if(patch.ok){
      status.className='success';
      status.textContent='✅ ¡Voto registrado correctamente!';
      setTimeout(()=>{
        document.getElementById('voting-form').style.display='none';
        document.getElementById('already-voted').style.display='block';
        status.style.display='none';
      },1500);
    }else{
      throw new Error('Error en servidor');
    }
  }catch(e){
    status.className='error';
    status.textContent='❌ Error al registrar. Intenta de nuevo.';
    localStorage.removeItem('voted_'+SESSION_KEY);
  }
}
</script>
</body>
</html>
