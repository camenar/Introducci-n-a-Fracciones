<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fracciones · Sesión 1 · I.E. Merceditas Gómez Martínez</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="document.dispatchEvent(new Event('katex-ready'))"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F2040;--blue:#1C3A6E;--blue-mid:#2E75B6;
  --teal:#1A6B5A;--amber:#C47C1A;--red:#B83232;--purple:#6C3483;
  --cream:#F4F3EF;--warm:#EDECEA;--border:#C0BDB4;
  --text:#0A0A0B;--text2:#2A2A2C;--text3:#4A4A4E;
  --green-s:#27AE60;--amber-s:#E08C20;--red-s:#C0392B;
}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'DM Sans',system-ui,sans-serif}
#deck{width:100vw;height:100vh;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;background:#fff}
.slide.active{opacity:1;pointer-events:all}
.slide.enter-r{animation:inR .35s cubic-bezier(.22,.68,0,1.15) forwards}
.slide.enter-l{animation:inL .35s cubic-bezier(.22,.68,0,1.15) forwards}
@keyframes inR{from{transform:translateX(4%);opacity:0}to{transform:none;opacity:1}}
@keyframes inL{from{transform:translateX(-4%);opacity:0}to{transform:none;opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
 
/* HEADER */
.hdr{background:var(--navy);height:54px;display:flex;align-items:center;padding:0 32px;justify-content:space-between;flex-shrink:0}
.hdr-b{font-size:18px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#C8DDEF}
.hdr-t{background:var(--blue-mid);color:#fff;font-size:17px;font-weight:800;padding:8px 22px;border-radius:5px;letter-spacing:.06em;text-transform:uppercase}
 
/* FOOTER */
.ftr{background:var(--warm);border-top:2px solid var(--border);height:44px;display:flex;align-items:center;padding:0 32px;justify-content:space-between;flex-shrink:0}
.ftr span{font-size:18px;color:var(--text3);font-weight:600}
 
/* BODY */
.body{flex:1;overflow:hidden;padding:24px 42px 18px;display:flex;flex-direction:column;gap:16px}
 
/* TIPOGRAFÍA */
.slide-title{font-family:'DM Serif Display',serif;font-size:clamp(48px, 5.5vw, 72px);color:var(--navy);line-height:1.1}
.slide-instr{font-size:clamp(26px, 3vw, 32px);color:var(--text2);font-style:italic;margin-top:4px;line-height:1.4}
.title-row{display:flex;align-items:flex-start;gap:20px}
.accent{width:12px;border-radius:5px;flex-shrink:0;align-self:stretch;min-height:52px}
 
/* MOMENTO BADGE */
.mbadge{display:inline-flex;align-items:center;gap:9px;background:var(--navy);color:#fff;font-size:19px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 20px;border-radius:6px;margin-bottom:4px}
 
/* KATEX */
.katex{font-size:1em!important}
.katex-display{font-size:1em!important;margin:0!important}
.formula-row .katex,.hac-answer .katex{font-size:3.2em!important;color:var(--text)!important}
.ej-frac .katex{font-size:5em!important;color:var(--text)!important}
.fml .katex{font-size:4.2em!important;color:var(--navy)!important}
.vote-btn .katex{font-size:2.2em!important}
.answer-txt .katex{font-size:2.4em!important}
 
/* PORTADA */
.s-portada{background:var(--navy);align-items:center;justify-content:center}
.p-inner{display:flex;flex-direction:column;align-items:center;gap:24px;text-align:center;padding:40px;width:100%;max-width:1400px}
.p-badge{font-size:22px;letter-spacing:.14em;text-transform:uppercase;color:#C8DDEF;font-weight:600}
.p-title{font-family:'DM Serif Display',serif;font-size:clamp(80px, 13vw, 160px);color:#fff;line-height:1;animation:fadeUp .8s .1s both}
.p-title em{color:#F5C842;font-style:normal}
.p-sub{font-size:clamp(28px, 3vw, 38px);color:#C8DDEF;animation:fadeUp .8s .3s both}
.p-sessions{display:flex;gap:24px;margin-top:6px;animation:fadeUp .8s .5s both;width:100%;justify-content:center}
.psess{background:rgba(255,255,255,.09);border:1px solid rgba(200,221,239,.25);border-radius:16px;padding:24px 28px;display:flex;flex-direction:column;align-items:center;gap:12px;flex:1;max-width:320px}
.psess-n{width:60px;height:60px;border-radius:50%;background:var(--blue-mid);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:26px}
.psess-t{font-size:24px;font-weight:600;color:#fff;text-align:center;line-height:1.3}
.psess-s{font-size:19px;color:#C8DDEF;font-style:italic;text-align:center}
 
/* ═══════════════════════════════════════════════════════════════
   SLIDE 2 - DISEÑO PANEL AZUL IZQUIERDA
   ═══════════════════════════════════════════════════════════════ */
.sess-split {
  display: flex;
  width: 100%;
  height: 100%;
}
.sess-left {
  width: 35%;
  background: var(--navy);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: #fff;
}
.sess-num {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(120px, 16vw, 240px);
  line-height: 1;
  font-weight: 400;
}
.sess-label {
  font-size: clamp(32px, 4vw, 56px);
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #8CA3C1; /* Azul grisáceo claro para contraste elegante */
}
.sess-right {
  flex: 1;
  padding: 40px 50px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 24px;
}

.obj-list-full {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
}
.obj-item-full {
  display: flex;
  align-items: center;
  gap: 20px;
  background: var(--cream);
  border-radius: 12px;
  padding: 18px 24px;
  border-left: 8px solid var(--blue-mid);
  font-size: clamp(22px, 2.4vw, 28px);
  color: var(--text);
  line-height: 1.35;
  width: 100%;
}
.obj-dot-full {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--blue-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}

/* DETONANTE */
.det-box{background:#FFF7ED;border:3px solid var(--amber);border-radius:14px;padding:20px 26px;flex:1;display:flex;flex-direction:column;gap:11px}
.det-label{font-size:19px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--amber)}
.det-text{font-family:'DM Serif Display',serif;font-size:clamp(30px, 3.5vw, 42px);color:var(--text);line-height:1.5;font-style:italic}
.pregs-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.preg-card{background:#fff;border-radius:12px;border:2px solid var(--border);border-top:5px solid var(--amber);padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:11px;text-align:center;opacity:0;transform:translateY(14px);transition:opacity .4s,transform .4s}
.preg-card.vis{opacity:1;transform:none}
.preg-n{width:50px;height:50px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff}
.preg-t{font-size:clamp(24px, 2.5vw, 30px);color:var(--text);font-style:italic;line-height:1.4}
 
/* YO HAGO */
.yo-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;flex:1}
.yo-panel{background:var(--cream);border:2px solid var(--border);border-top:5px solid var(--navy);border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:12px}
.yo-pt{font-size:19px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--navy)}
.frac-wrap{background:#fff;border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px;border:1px solid var(--border)}
.frac-lbl{font-size:19px;color:var(--text3);text-align:center;font-style:italic;font-weight:500}
.formula-box{background:var(--cream);border:2px solid var(--navy);border-top:5px solid var(--navy);border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:13px;flex:1}
.formula-row{display:flex;align-items:center;justify-content:center;padding:16px;background:#fff;border-radius:10px;border:1px solid var(--border)}
.vocab{background:var(--navy);border-radius:12px;padding:14px 18px;display:flex;justify-content:space-around;align-items:center;gap:12px;flex-wrap:wrap}
.voc-item{display:flex;flex-direction:column;align-items:center;gap:5px}
.voc-k{font-size:clamp(20px, 2.2vw, 26px);font-weight:700;text-transform:uppercase;letter-spacing:.09em}
.voc-v{font-size:clamp(18px, 2vw, 24px);color:rgba(255,255,255,.82)}
 
/* BARRA INTERACTIVA */
.ibar-wrap{display:flex;gap:6px;padding:10px 0;align-items:center;justify-content:center}
.ibar-seg{height:90px;flex:1;border-radius:8px;cursor:pointer;border:4px solid rgba(0,0,0,.12);background:#DEDBD3;transition:background .18s, transform .12s, box-shadow .18s;position:relative}
.ibar-seg:hover{transform:scaleY(1.06);box-shadow:0 4px 14px rgba(0,0,0,.18)}
.ibar-seg.lit{border-color:rgba(0,0,0,.18)}
.ibar-seg .seg-lbl{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:24px;font-weight:800;color:rgba(255,255,255,.9);pointer-events:none;opacity:0;transition:opacity .2s}
.ibar-seg.lit .seg-lbl{opacity:1}
.ibar-counter{font-size:32px;font-weight:800;color:var(--navy);min-width:60px;text-align:center;flex-shrink:0}
.ibar-hint{font-size:20px;color:var(--text3);font-style:italic;text-align:center;padding:4px 0}
/* EJEMPLOS */
.ej-card{background:#fff;border-radius:14px;padding:22px 24px;display:flex;flex-direction:column;gap:14px;border:2px solid var(--border);border-top:6px solid transparent;opacity:0;transform:translateX(16px);transition:opacity .5s,transform .5s;overflow:hidden;min-height:0}
.ej-card.vis{opacity:1;transform:none}
.ej-head{display:flex;align-items:center;gap:14px;flex-shrink:0}
.ej-n{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;color:#fff;flex-shrink:0}
.ej-title{font-size:clamp(26px, 2.8vw, 34px);font-weight:700;color:var(--text)}
.ej-ctx{font-size:clamp(24px, 2.6vw, 32px);color:var(--text2);font-style:italic;line-height:1.4;flex-shrink:0}
.ej-frac{background:var(--cream);border-radius:10px;padding:10px 12px;text-align:center;border:1px solid var(--border);flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:0;overflow:hidden}
 
/* FORMALIZACIÓN */
.formal-layout{display:grid;grid-template-columns:1fr 1.1fr;gap:13px;flex:1;align-items:stretch}
.formal-l{display:flex;flex-direction:column;gap:10px}
.model-box{background:var(--cream);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;flex:1;border:2px solid var(--border)}
.model-box-t{font-size:17px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.1em}
.conj{background:#FFF7ED;border:2.5px solid var(--amber);border-radius:10px;padding:12px 15px;font-size:clamp(20px, 2.2vw, 24px);color:var(--text);line-height:1.45;font-style:italic}
.formal-r{display:flex;flex-direction:column;gap:10px}
.rv{background:var(--cream);border:2px solid var(--border);border-left:6px solid var(--navy);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:9px;opacity:0;transform:translateY(16px);transition:opacity .5s cubic-bezier(.22,.68,0,1.2),transform .5s cubic-bezier(.22,.68,0,1.2)}
.rv.vis{opacity:1;transform:none}
.rv-t{font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--navy)}
.fml{background:#fff;border-radius:10px;padding:18px;text-align:center;border:2px solid var(--border)}
.rv-body{font-size:clamp(23px, 2.5vw, 29px);color:var(--text);line-height:1.6}
.parts-g{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pt{border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:5px}
.pt-n{font-size:clamp(22px, 2.4vw, 28px);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.pt-d{font-size:clamp(20px, 2.2vw, 26px);line-height:1.4}
.click-hint{font-size:20px;color:var(--text3);text-align:center;font-style:italic;padding:3px}
 
/* HACEMOS / TÚ HACES */
.hac-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1}
.hac-card{background:#fff;border-radius:12px;border:2px solid var(--border);border-top:5px solid transparent;padding:16px;display:flex;flex-direction:column;gap:9px;opacity:0;transform:translateY(14px);transition:opacity .45s,transform .45s}
.hac-card.vis{opacity:1;transform:none}
.hac-head{display:flex;align-items:center;gap:12px}
.hac-n{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:19px;color:#fff;flex-shrink:0}
.hac-title{font-size:clamp(23px, 2.4vw, 29px);font-weight:700;color:var(--text)}
.hac-ctx{font-size:clamp(23px, 2.4vw, 29px);color:var(--text2);font-style:italic;line-height:1.4}
.hac-bar{background:var(--cream);border-radius:8px;padding:10px;border:1px solid var(--border)}
.hac-task{background:var(--cream);border-radius:8px;padding:10px 14px;font-size:clamp(21px, 2.2vw, 27px);color:var(--navy);font-style:italic;font-weight:600;border-left:4px solid var(--blue-mid)}
.hac-answer{font-size:clamp(22px, 2.3vw, 28px)!important;border-radius:8px;padding:11px 14px}
 
/* TRANSICIÓN */
.s-trans{background:var(--navy);align-items:center;justify-content:center}
.trans-big{font-family:'DM Serif Display',serif;font-size:clamp(70px, 12vw, 130px);color:#fff;line-height:1;animation:fadeUp .6s both}
.trans-sub{font-size:clamp(28px, 3vw, 36px);color:#C8DDEF;animation:fadeUp .6s .2s both}
.trans-note{font-size:clamp(22px, 2.4vw, 28px);color:rgba(200,221,239,.65);font-style:italic;animation:fadeUp .6s .4s both}
 
/* VOTACIÓN */
.inter-layout{display:grid;grid-template-columns:1fr 1fr;gap:15px;flex:1;align-items:start}
.inter-l,.inter-r{display:flex;flex-direction:column;gap:11px}
.question-box{background:#fff;border-radius:14px;border:2px solid var(--blue-mid);border-top:5px solid var(--blue-mid);padding:17px 20px}
.q-label{font-size:18px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--blue-mid);margin-bottom:10px}
.vote-area{display:flex;flex-direction:column;gap:9px}
.vote-btn{background:#fff;border:2px solid var(--border);border-radius:11px;padding:16px 20px;font-size:clamp(24px, 2.5vw, 30px);font-family:inherit;color:var(--text);cursor:pointer;text-align:left;transition:all .2s;display:flex;align-items:center;gap:14px}
.vote-btn:hover{border-color:var(--blue-mid);background:#EEF5FB}
.vote-btn.selected{border-color:var(--navy);background:var(--navy);color:#fff}
.vote-indicator{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--border);flex-shrink:0;transition:all .2s}
.vote-btn.selected .vote-indicator{background:#fff;border-color:#fff}
.results-panel{background:#fff;border-radius:14px;border:2px solid var(--border);padding:17px;display:flex;flex-direction:column;gap:10px}
.res-title{font-size:19px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.09em}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.bar-lbl{font-size:clamp(21px, 2.2vw, 27px);color:var(--text);min-width:168px;line-height:1.3}
.bar-track{flex:1;height:42px;background:var(--warm);border-radius:7px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:7px;transition:width .6s cubic-bezier(.22,.68,0,1.2);display:flex;align-items:center;padding-left:12px;min-width:0}
.bar-val{font-size:19px;font-weight:700;color:#fff;white-space:nowrap}
.vote-total{font-size:clamp(20px, 2.1vw, 25px);color:var(--text3);text-align:center;font-weight:500}
.sim-btn{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:14px;font-size:clamp(21px, 2.2vw, 26px);font-family:inherit;cursor:pointer;font-weight:600;transition:background .2s}
.sim-btn:hover{background:var(--blue-mid)}
.answer-box{background:#EEF5FB;border:2px solid var(--blue-mid);border-radius:12px;padding:15px 18px}
.answer-lbl{font-size:17px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.answer-txt{font-size:clamp(23px, 2.4vw, 30px);color:var(--text);line-height:1.55}
.vote-url-bar{background:var(--navy);border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:14px}
.vote-url-lbl{font-size:18px;color:#C8DDEF;font-weight:700;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.vote-url-val{font-family:monospace;font-size:clamp(22px, 2.3vw, 28px);color:#fff;background:rgba(255,255,255,.12);padding:7px 14px;border-radius:6px;letter-spacing:.03em}
.vote-status{font-size:17px;color:#C8DDEF;margin-left:auto;white-space:nowrap;font-weight:600}
 
/* GEOGEBRA */
.ggb-layout{display:flex;flex-direction:column;gap:10px;flex:1;overflow:hidden}
.ggb-wrap{flex:1;border-radius:12px;overflow:hidden;border:2px solid var(--border);background:#fff;min-height:0}
.ggb-wrap iframe{width:100%;height:100%;border:none;display:block}
.ggb-nota{background:#E8F5F0;border:2.5px solid var(--teal);border-radius:10px;padding:13px 18px;font-size:clamp(23px, 2.5vw, 29px);color:var(--text);line-height:1.5;flex-shrink:0}
 
/* RÚBRICA */
.rub-table{width:100%;border-collapse:collapse}
.rub-table th{background:var(--navy);color:#fff;padding:15px 15px;text-align:left;font-size:clamp(20px, 2.1vw, 25px);font-weight:700}
.rub-table td{padding:14px 15px;border-bottom:1.5px solid var(--border);vertical-align:top;line-height:1.4;color:var(--text);font-size:clamp(20px, 2.1vw, 25px)}
.rub-table tr:nth-child(even) td{background:var(--cream)}
.rub-table tr:nth-child(odd) td{background:#fff}
.rub-table td:first-child{font-weight:700;color:var(--navy);background:#EEF5FB!important;border-right:3px solid var(--blue-mid)}
.rub-table tbody tr{opacity:0;transform:translateX(-10px);transition:opacity .4s,transform .4s}
.rub-table tbody tr.vis{opacity:1;transform:none}
.rub-table thead tr{opacity:1;transform:none}
.nbadge{width:13px;height:13px;border-radius:50%;display:inline-block;margin-right:7px}
 
/* METACOGNICIÓN */
.meta-layout{display:grid;grid-template-columns:1.1fr 1fr;gap:15px;flex:1}
.meta-l{display:flex;flex-direction:column;gap:13px}
.meta-qbox{background:#E8F5F0;border:3px solid var(--teal);border-radius:14px;padding:19px 22px;display:flex;flex-direction:column;gap:8px}
.meta-qlbl{font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal)}
.meta-qtxt{font-family:'DM Serif Display',serif;font-size:clamp(23px, 2.5vw, 31px);color:var(--text);font-style:italic;line-height:1.5}
.cuad-t{font-size:clamp(21px, 2.2vw, 27px);font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.1em}
.cuad-items{display:flex;flex-direction:column;gap:9px}
.cuad-item{display:flex;align-items:flex-start;gap:13px;background:#fff;border-radius:10px;padding:12px 15px;border-left:5px solid var(--teal);font-size:clamp(23px, 2.4vw, 29px);color:var(--text);line-height:1.4}
.cuad-n{font-weight:700;color:var(--teal);flex-shrink:0;min-width:28px;font-size:clamp(23px, 2.4vw, 29px)}
.meta-r{display:flex;flex-direction:column;gap:13px}
.sema-t{font-size:clamp(21px, 2.2vw, 27px);font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.1em}
.sema-items{display:flex;flex-direction:column;gap:11px}

<script>
function fracBar(sh,tot,col,w,h){
  const cw=(w-(tot+1)*3)/tot;let s='';
  for(let i=0;i<tot;i++){const x=3+i*(cw+3);s+=`<rect x="${x.toFixed(1)}" y="3" width="${cw.toFixed(1)}" height="${h-6}" rx="4" fill="${i<sh?col:'#DEDBD3'}" stroke="#fff" stroke-width="2"/>`;}
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" xmlns="http://www.w3.org/2000/svg">${s}</svg>`;
}
function fracCircle(sh,tot,col,sz){
  const cx=sz/2,cy=sz/2,r=sz/2-4,a=2*Math.PI/tot;let p='';
  for(let i=0;i<tot;i++){const a1=-Math.PI/2+i*a,a2=a1+a,x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);p+=`<path d="M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${a>Math.PI?1:0} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z" fill="${i<sh?col:'#DEDBD3'}" stroke="#fff" stroke-width="2"/>`;}
  return `<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}" xmlns="http://www.w3.org/2000/svg">${p}</svg>`;
}

document.getElementById('fs-btn').addEventListener('click',()=>{

/* FIREBASE */
const FB_URL='https://fracciones-merceditas-default-rtdb.firebaseio.com';
const SESSION_KEY='sesion1_'+new Date().toISOString().slice(0,10);
const localVotes={a:0,b:0,c:0};
function getVotePath(){return `${FB_URL}/votes/${SESSION_KEY}.json`;}
async function fbGet(){try{const r=await fetch(getVotePath());return r.ok?await r.json():null;}catch(e){return null;}}
async function fbPatch(data){try{const r=await fetch(getVotePath(),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});return r.ok;}catch(e){return false;}}
let pollInterval=null;
function startPolling(){if(pollInterval)return;pollInterval=setInterval(async()=>{const d=await fbGet();if(d)renderBars(d);updateStatus(d);},2500);}
function stopPolling(){if(pollInterval){clearInterval(pollInterval);pollInterval=null;}}
function renderBars(data){
  const d=data||{a:0,b:0,c:0};const total=(d.a||0)+(d.b||0)+(d.c||0)||1;
  ['a','b','c'].forEach(k=>{const pct=Math.round((d[k]||0)/total*100);const f=document.getElementById('bf'+k);if(f){f.style.width=pct+'%';const v=f.querySelector('.bar-val');if(v)v.textContent=pct+'%';}});
  const tot=(d.a||0)+(d.b||0)+(d.c||0);const el=document.getElementById('vote-total');if(el)el.textContent=tot+' respuesta'+(tot!==1?'s':'');
}
function updateStatus(data){const tot=data?(data.a||0)+(data.b||0)+(data.c||0):0;const st=document.getElementById('vote-status');if(st)st.textContent=' EN VIVO · '+tot+' votos';}
async function voteFor(opt){
  const alreadyEl=document.getElementById('already-voted');
  if(localStorage.getItem('voted_'+SESSION_KEY)){if(alreadyEl)alreadyEl.style.display='block';return;}
  localStorage.setItem('voted_'+SESSION_KEY,'1');
  document.querySelectorAll('.vote-btn').forEach(b=>b.classList.remove('selected'));
  const btn=document.getElementById('vb'+opt);if(btn)btn.classList.add('selected');
  const ok=await fbPatch(await(async()=>{const c=await fbGet()||{a:0,b:0,c:0};c[opt]=(c[opt]||0)+1;return c;})());
  if(!ok){localVotes[opt]++;renderBars(localVotes);}else{const fresh=await fbGet();if(fresh)renderBars(fresh);}
}
function simVotes(){['a','a','a','b','c','a','b','a','c','b','a','c','a','b'].forEach((v,i)=>{setTimeout(async()=>{const cur=await fbGet()||{a:0,b:0,c:0};cur[v]=(cur[v]||0)+1;await fbPatch(cur);const fresh=await fbGet();if(fresh)renderBars(fresh);updateStatus(fresh);},i*300);});}
function resetVotes(){localStorage.removeItem('voted_'+SESSION_KEY);fbPatch({a:0,b:0,c:0});renderBars({a:0,b:0,c:0});document.querySelectorAll('.vote-btn').forEach(b=>b.classList.remove('selected'));const el=document.getElementById('vote-total');if(el)el.textContent='0 respuestas';const aa=document.getElementById('already-voted');if(aa)aa.style.display='none';}
 
/* ══ BARRAS INTERACTIVAS ══ */
function initInterBar(containerId, total, color, fracId){
  const wrap = document.getElementById(containerId);
  if(!wrap) return;
  wrap.innerHTML = '';
  const counter = document.createElement('div');
  counter.className = 'ibar-counter';
  counter.textContent = '0 / ' + total;
  const segsWrap = document.createElement('div');
  segsWrap.style.cssText = 'display:flex;gap:6px;flex:1;align-items:stretch';
  let selected = 0;
  const segs = [];
  for(let i = 0; i < total; i++){
    const seg = document.createElement('div');
    seg.className = 'ibar-seg';
    seg.style.height = '90px';
    const lbl = document.createElement('div');
    lbl.className = 'seg-lbl';
    lbl.textContent = i + 1;
    seg.appendChild(lbl);
    segs.push(seg);
    segsWrap.appendChild(seg);
    seg.addEventListener('click', ()=>{
      if(wrap.dataset.locked) return;
      const newSel = (selected === i + 1) ? i : i + 1;
      selected = newSel;
      segs.forEach((s, idx) => {
        if(idx < selected){
          s.style.background = color;
          s.classList.add('lit');
        } else {
          s.style.background = '#DEDBD3';
          s.classList.remove('lit');
        }
      });
      counter.textContent = selected + ' / ' + total;
    });
  }
  wrap.style.cssText = 'display:flex;align-items:center;gap:16px;padding:8px 0';
  wrap.appendChild(segsWrap);
  wrap.appendChild(counter);
}
 
function revealInterFrac(barId, fracId, defaultNumerator, denominator){
  const wrap = document.getElementById(barId);
  const fracEl = document.getElementById(fracId);
  if(!wrap || !fracEl) return;
  const segs = wrap.querySelectorAll('.ibar-seg');
  const selected = Array.from(segs).filter(s => s.classList.contains('lit')).length;
  const numerator = selected > 0 ? selected : defaultNumerator;
  wrap.dataset.locked = '1';
  fracEl.innerHTML = '\\(\\dfrac{' + numerator + '}{' + denominator + '}\\)';
  fracEl.style.opacity = '1';
  if(window.renderMathInElement) renderMathInElement(fracEl, {
    delimiters:[{left:'\\(',right:'\\)',display:false},{left:'$$',right:'$$',display:true}], throwOnError:false
  });
}

/* ENGINE */
let cur=0,clicks=0;
const deck=document.getElementById('deck');
 
function buildSlide(idx){
  const s=SLIDES[idx];
  const d=document.createElement('div');
  d.className='slide'+(s.cls?' '+s.cls:'');
  let h='';
  if(!s.noH)h+=`<div class="hdr"><span class="hdr-b">${s.bread||''}</span>${s.time?`<span class="hdr-t">${s.time}</span>`:''}</div>`;
  h+=`<div class="body">${s.html}</div>`;
  if(!s.noF)h+=`<div class="ftr"><span>${s.fL||''}</span><span>I.E. Merceditas Gómez Martínez · Grado 7°</span></div>`;
  d.innerHTML=h;return d;
}
function show(idx,dir){
  const prev=deck.querySelector('.slide.active');
  if(prev){prev.classList.remove('active','enter-r','enter-l');if(SLIDES[cur-dir]&&SLIDES[cur-dir].onLeave)SLIDES[cur-dir].onLeave();}
  const el=buildSlide(idx);deck.appendChild(el);
  const all=deck.querySelectorAll('.slide');if(all.length>3)all[0].remove();
  requestAnimationFrame(()=>{
    el.classList.add('active');el.classList.add(dir>=0?'enter-r':'enter-l');
    setTimeout(()=>el.classList.remove('enter-r','enter-l'),380);
    doKatex(el);if(SLIDES[idx].onEnter)SLIDES[idx].onEnter();
  });
  clicks=0;
  document.getElementById('ncnt').textContent=`${idx+1} / ${SLIDES.length}`;
  document.getElementById('pbar').style.width=(((idx+1)/SLIDES.length)*100)+'%';
}
function doKatex(el){
  if(window.renderMathInElement)renderMathInElement(el,{delimiters:[{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true},{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});
}
function advance(){const s=SLIDES[cur];if(clicks<(s.clicks||0)){clicks++;if(s.onReveal)s.onReveal(clicks);return;}if(cur<SLIDES.length-1){cur++;show(cur,1);}}
function retreat(){if(cur>0){cur--;show(cur,-1);}}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowRight'){e.preventDefault();advance();}
  if(e.code==='ArrowLeft'){e.preventDefault();retreat();}
  if(e.code==='KeyF'){document.getElementById('fs-btn').click();}
});
document.getElementById('bn').addEventListener('click',advance);
document.getElementById('bp').addEventListener('click',retreat);
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?advance():retreat();}});
setTimeout(()=>{document.getElementById('hint').style.opacity='0';},5000);
document.addEventListener('katex-ready',()=>{const a=deck.querySelector('.slide.active');if(a)doKatex(a);});
show(0,1);
</script>
