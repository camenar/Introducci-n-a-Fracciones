<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F2040;--blue:#1C3A6E;--blue-mid:#2E75B6;
  --teal:#1A6B5A;--amber:#C47C1A;--red:#B83232;--purple:#6C3483;

}}

html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'DM Sans',system-ui,sans-serif}
#deck{width:100vw;height:100vh;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;background:#fff}
.slide.active{opacity:1;pointer-events:all}
.slide.enter-r{animation:inR .35s cubic-bezier(.22,.68,0,1.15) forwards}
.slide.enter-l{animation:inL .35s cubic-bezier(.22,.68,0,1.15) forwards}
@keyframes inR{from{transform:translateX(4%);opacity:0}to{transform:none;opacity:1}}
@keyframes inL{from{transform:translateX(-4%);opacity:0}to{transform:none;opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.rv{background:var(--cream);border:2px solid var(--border);border-left:6px solid var(--navy);border-radius:var(--radius);padding:var(--pad-v) var(--pad-h);display:flex;flex-direction:column;gap:8px;opacity:0;transform:translateY(14px);transition:opacity .5s cubic-bezier(.22,.68,0,1.2),transform .5s cubic-bezier(.22,.68,0,1.2)}
.rv.vis{opacity:1;transform:none}
.rv-t{font-size:var(--fs-sm);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--navy)}

.conj{background:#FFF7ED;border:2.5px solid var(--amber);border-radius:calc(var(--radius) - 2px);padding:var(--pad-v) var(--pad-h);font-size:var(--fs-md);color:var(--text);line-height:1.5;font-style:italic}
.hac-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);flex:1}
.hac-card{background:#fff;border-radius:var(--radius);border:2px solid var(--border);border-top:5px solid transparent;padding:var(--pad-v) var(--pad-h);display:flex;flex-direction:column;gap:8px;opacity:0;transform:translateY(12px);transition:opacity .45s,transform .45s}
.hac-card.vis{opacity:1;transform:none}
.hac-head{display:flex;align-items:center;gap:10px}
.hac-n{width:var(--dot-sz);height:var(--dot-sz);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:var(--fs-md);color:#fff;flex-shrink:0}
.hac-title{font-size:var(--fs-lg);font-weight:700;color:var(--text)}
.hac-ctx{font-size:var(--fs-md);color:var(--text2);font-style:italic;line-height:1.4}
.hac-task{background:var(--cream);border-radius:6px;padding:8px 12px;font-size:var(--fs-md);color:var(--navy);font-style:italic;font-weight:600;border-left:4px solid var(--blue-mid)}
.hac-answer{border-radius:6px;padding:9px 12px;font-size:var(--fs-md);font-weight:700;opacity:0;transition:opacity .4s}
.latex-inline{background:var(--warm);border-radius:6px;padding:5px 10px;text-align:center;border:1px solid var(--border);font-size:var(--fs-lg);font-family:'DM Serif Display',serif}
.s-trans{background:var(--navy);align-items:center;justify-content:center}
.trans-big{font-family:'DM Serif Display',serif;font-size:var(--fs-3xl);color:#fff;line-height:1;animation:fadeUp .6s both}
.trans-sub{font-size:var(--fs-xl);color:#C8DDEF;animation:fadeUp .6s .2s both}
.trans-note{font-size:var(--fs-lg);color:rgba(200,221,239,.65);font-style:italic;animation:fadeUp .6s .4s both}
.metodo-btn{background:#fff;border:2.5px solid var(--border);border-radius:var(--radius);padding:10px 18px;font-size:var(--fs-md);font-family:'DM Sans',sans-serif;font-weight:700;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .2s,border-color .2s,color .2s}
.metodo-btn:hover{background:var(--cream);border-color:var(--navy);color:var(--navy)}
.metodo-btn.activo-cruz{background:var(--navy);border-color:var(--navy);color:#fff}
.metodo-btn.activo-simpl{background:var(--teal);border-color:var(--teal);color:#fff}
.metodo-btn.activo-div{background:var(--amber);border-color:var(--amber);color:#fff}
.paso-card{background:#fff;border:2px solid var(--border);border-radius:var(--radius);padding:var(--pad-v) var(--pad-h);animation:fadeIn .3s ease;display:none}
.paso-card.paso-result{border-color:var(--green-s);background:#F0FFF4}
.paso-num{font-size:var(--fs-xs);font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.paso-text{font-size:var(--fs-md);color:var(--text);line-height:1.45;margin-bottom:6px}

.ggb-nota{background:#E8F5F0;border:2.5px solid var(--teal);border-radius:var(--radius);padding:var(--pad-v) var(--pad-h);font-size:var(--fs-md);color:var(--text);line-height:1.5;flex-shrink:0}

<script>
const SLIDES=[

{cls:'s-portada',noH:true,noF:true,clicks:0,html:`

{bread:'Sesión 2 › Formalización (10 min) › PPT animado',time:'FORMALIZACIÓN · 10 min',
fL:'Formalización — Conjetura → PPT revela',clicks:4,html:`
<div class="title-row">
  <div class="accent" style="background:var(--blue-mid)"></div>
  <div style="flex:1">
    <div class="mbadge" style="background:var(--blue-mid)">✏️ Formalización</div>
    <div class="slide-title">Escribe tu conjetura <em style="color:var(--blue-mid)">antes</em> del clic</div>
    <div class="slide-instr">«Para pasar de 1/2 a 2/4 multipliqué ___ y ___. Eso se llama ___» — el PPT revela.</div>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1">
  <div class="rv" id="fc1" style="border-left-color:var(--navy)"><div class="rv-t">① Amplificación</div><div class="fml">\\( \\dfrac{a}{b} = \\dfrac{a \\cdot n}{b \\cdot n} \\quad n \\neq 0 \\)</div><div class="rv-body">Multiplicar numerador y denominador por el mismo número ≠ 0.<br><em style="color:var(--text3)">Ejemplo: 1/2 × (2/2) = 2/4</em></div></div>
  <div class="rv" id="fc2" style="border-left-color:var(--teal)"><div class="rv-t">② Simplificación</div><div class="fml">\\( \\dfrac{a}{b} = \\dfrac{a \\div n}{b \\div n} \\quad n = \\text{MCD}(a,b) \\)</div><div class="rv-body">Dividir numerador y denominador entre su MCD.<br><em style="color:var(--text3)">Ejemplo: 6/8 → MCD=2 → 3/4</em></div></div>
  <div class="rv" id="fc3" style="border-left-color:var(--amber)"><div class="rv-t">③ Fracción irreducible</div><div class="fml">\\( \\text{MCD}(a,b) = 1 \\Rightarrow \\dfrac{a}{b} \\text{ es irreducible} \\)</div><div class="rv-body">No se puede simplificar más.<br><em style="color:var(--text3)">Ejemplo: 3/4 — MCD(3,4)=1 ✓</em></div></div>
  <div class="rv" id="fc4" style="border-left-color:var(--red)"><div class="rv-t">④ Verificar equivalencia</div><div class="fml">\\( \\dfrac{a}{b} = \\dfrac{c}{d} \\iff a \\cdot d = b \\cdot c \\)</div><div class="rv-body">Producto cruzado: si son iguales, las fracciones son equivalentes.<br><em style="color:var(--text3)">1/2 y 3/6: 1×6=6, 2×3=6 ✓</em></div></div>
</div>
<div style="text-align:center;font-size:19px;color:var(--text3);font-style:italic;margin-top:4px">🖊 Contrasta cada propiedad con tu conjetura en color diferente.</div>`,
onReveal:n=>{const ids=['fc1','fc2','fc3','fc4'];document.getElementById(ids[n-1]).classList.add('vis');}},

{bread:'Sesión 2 › Aplicación › Tres métodos — Ejemplo guiado',time:'APLICACIÓN · 8 min',
fL:'Tres métodos para verificar equivalencia',clicks:0,html:`
<div class="title-row">
  <div class="accent" style="background:var(--teal)"></div>
  <div style="flex:1">
    <div class="mbadge" style="background:var(--teal)">🔬 Los tres métodos</div>
    <div class="slide-title">¿Son equivalentes 6/9 y 10/15?</div>
    <div class="slide-instr">Elige un método y sigue los pasos.</div>
  </div>
</div>
<div id="metodo-btns" style="display:flex;gap:14px;margin:6px 0 10px;flex-wrap:wrap">
  <button class="metodo-btn" id="btn-cruz" onclick="selectMetodo('cruz')">✕ Multiplicación en cruz</button>
  <button class="metodo-btn" id="btn-simpl" onclick="selectMetodo('simpl')">÷ Simplificación (MCD)</button>
  <button class="metodo-btn" id="btn-div" onclick="selectMetodo('div')">÷ División y comparación</button>
</div>
<div id="metodo-area" style="flex:1;display:flex;gap:14px;overflow:hidden">
  <div id="metodo-inicial" style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
    <div style="font-family:'DM Serif Display',serif;font-size:clamp(40px,6vw,70px);color:var(--navy);display:flex;align-items:center;gap:24px">
      <span style="display:inline-flex;flex-direction:column;align-items:center;gap:2px"><span>6</span><span style="border-top:3px solid var(--navy);width:100%"></span><span>9</span></span>
      <span style="font-size:.7em;color:var(--text3)">≟</span>
      <span style="display:inline-flex;flex-direction:column;align-items:center;gap:2px"><span>10</span><span style="border-top:3px solid var(--navy);width:100%"></span><span>15</span></span>
    </div>
    <div style="font-size:clamp(20px,2.2vw,26px);color:var(--text3);font-style:italic">Selecciona un método arriba para comenzar</div>
  </div>
  <div id="metodo-cruz" style="flex:1;flex-direction:column;gap:10px;display:none">
    <div class="paso-card" id="cruz-0"><div class="paso-num">Paso 1 — Identificamos</div><div class="paso-text">Las dos fracciones que queremos comparar.</div><div class="paso-formula">\\( \\dfrac{6}{9} \\stackrel{?}{=} \\dfrac{10}{15} \\)</div></div>
    <div class="paso-card" id="cruz-1"><div class="paso-num">Paso 2 — Primer producto cruzado</div><div class="paso-text">Numerador de la primera × denominador de la segunda.</div><div class="paso-formula">\\( 6 \\times 15 = \\mathbf{90} \\)</div></div>
    <div class="paso-card" id="cruz-2"><div class="paso-num">Paso 3 — Segundo producto cruzado</div><div class="paso-text">Numerador de la segunda × denominador de la primera.</div><div class="paso-formula">\\( 10 \\times 9 = \\mathbf{90} \\)</div></div>
    <div class="paso-card paso-result" id="cruz-3"><div class="paso-num">Conclusión</div><div class="paso-text">Los dos productos son iguales → <strong>son equivalentes</strong>.</div><div class="paso-formula" style="color:var(--green-s)">\\( 90 = 90 \\;\\Rightarrow\\; \\dfrac{6}{9} = \\dfrac{10}{15} \\checkmark \\)</div></div>
  </div>
  <div id="metodo-simpl" style="flex:1;flex-direction:column;gap:10px;display:none">
    <div class="paso-card" id="simpl-0"><div class="paso-num">Paso 1 — MCD de la primera</div><div class="paso-text">Hallamos MCD(6, 9).</div><div class="paso-formula">\\( \\text{MCD}(6,\\,9) = 3 \\)</div></div>
    <div class="paso-card" id="simpl-1"><div class="paso-num">Paso 2 — Irreducible de 6/9</div><div class="paso-text">Dividimos entre el MCD.</div><div class="paso-formula">\\( \\dfrac{6 \\div 3}{9 \\div 3} = \\dfrac{2}{3} \\)</div></div>
    <div class="paso-card" id="simpl-2"><div class="paso-num">Paso 3 — Irreducible de 10/15</div><div class="paso-text">MCD(10, 15) = 5. Dividimos.</div><div class="paso-formula">\\( \\dfrac{10 \\div 5}{15 \\div 5} = \\dfrac{2}{3} \\)</div></div>
    <div class="paso-card paso-result" id="simpl-3"><div class="paso-num">Conclusión</div><div class="paso-text">Ambas reducen a la misma fracción irreducible → <strong>son equivalentes</strong>.</div><div class="paso-formula" style="color:var(--green-s)">\\( \\dfrac{2}{3} = \\dfrac{2}{3} \\;\\Rightarrow\\; \\dfrac{6}{9} = \\dfrac{10}{15} \\checkmark \\)</div></div>
  </div>
  <div id="metodo-div" style="flex:1;flex-direction:column;gap:10px;display:none">
    <div class="paso-card" id="div-0"><div class="paso-num">Paso 1 — Dividimos la primera</div><div class="paso-text">Numerador ÷ denominador de la primera fracción.</div><div class="paso-formula">\\( 6 \\div 9 = 0{,}666\\ldots \\)</div></div>
    <div class="paso-card" id="div-1"><div class="paso-num">Paso 2 — Dividimos la segunda</div><div class="paso-text">Numerador ÷ denominador de la segunda fracción.</div><div class="paso-formula">\\( 10 \\div 15 = 0{,}666\\ldots \\)</div></div>
    <div class="paso-card" id="div-2"><div class="paso-num">Paso 3 — Comparamos</div><div class="paso-text">Si los cocientes son iguales, las fracciones son equivalentes.</div><div class="paso-formula">\\( 0{,}666\\ldots = 0{,}666\\ldots \\)</div></div>
    <div class="paso-card paso-result" id="div-3"><div class="paso-num">Conclusión</div><div class="paso-text">Cocientes idénticos → <strong>son equivalentes</strong>. El producto cruzado y la simplificación son más exactos.</div><div class="paso-formula" style="color:var(--green-s)">\\( \\dfrac{6}{9} = \\dfrac{10}{15} \\checkmark \\)</div></div>
  </div>
</div>
<div style="text-align:center;font-size:19px;color:var(--text3);font-style:italic;margin-top:6px">Después de explorar los tres métodos, haz clic para continuar →</div>`},

let cur=0,clicks=0;
const deck=document.getElementById('deck');
const metodoPasos={cruz:['cruz-0','cruz-1','cruz-2','cruz-3'],simpl:['simpl-0','simpl-1','simpl-2','simpl-3'],div:['div-0','div-1','div-2','div-3']};
let metodoActivo=null,metodoPaso=0;

function selectMetodo(m){
  ['cruz','simpl','div'].forEach(x=>{
    document.getElementById('metodo-'+x).style.display='none';
    document.getElementById('btn-'+x).className='metodo-btn';
    metodoPasos[x].forEach(id=>{document.getElementById(id).style.display='none';});
  });
  metodoActivo=m;metodoPaso=0;
  document.getElementById('metodo-inicial').style.display='none';
  const el=document.getElementById('metodo-'+m);
  el.style.display='flex';el.style.flexDirection='column';el.style.gap='10px';
  document.getElementById('btn-'+m).classList.add('activo-'+m);
  document.getElementById(metodoPasos[m][0]).style.display='block';
  metodoPaso=1;
  doKatex(document.getElementById('metodo-'+m));
}

function buildSlide(idx){
  const s=SLIDES[idx];
  const d=document.createElement('div');
  d.className='slide'+(s.cls?' '+s.cls:'');
  let h='';
  if(!s.noH)h+=`<div class="hdr"><span class="hdr-b">${s.bread||''}</span>${s.time?`<span class="hdr-t">${s.time}</span>`:''}</div>`;
  h+=`<div class="body">${s.html}</div>`;
  if(!s.noF)h+=`<div class="ftr"><span>${s.fL||''}</span><span>I.E. Merceditas Gómez Martínez · Grado 7°</span></div>`;
  d.innerHTML=h;return d;
}

function show(idx,dir){
  const prev=deck.querySelector('.slide.active');
  if(prev){prev.classList.remove('active','enter-r','enter-l');}
  const el=buildSlide(idx);deck.appendChild(el);
  const all=deck.querySelectorAll('.slide');if(all.length>3)all[0].remove();
  requestAnimationFrame(()=>{
    el.classList.add('active');el.classList.add(dir>=0?'enter-r':'enter-l');
    setTimeout(()=>el.classList.remove('enter-r','enter-l'),380);
    doKatex(el);
    if(SLIDES[idx].onEnter)SLIDES[idx].onEnter();
  });
  clicks=0;metodoActivo=null;metodoPaso=0;
  document.getElementById('ncnt').textContent=`${idx+1} / ${SLIDES.length}`;
  document.getElementById('pbar').style.width=(((idx+1)/SLIDES.length)*100)+'%';
}

function doKatex(el){
  if(window.renderMathInElement)renderMathInElement(el,{
    delimiters:[{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true},{left:'$$',right:'$$',display:true}],
    throwOnError:false
  });
}

function advance(){
  const s=SLIDES[cur];
  const esMetodos=SLIDES[cur].html&&SLIDES[cur].html.includes('metodo-btns');
  if(esMetodos){
    if(!metodoActivo){
      const btns=document.querySelectorAll('.metodo-btn');
      btns.forEach(b=>{b.style.transition='box-shadow .15s';b.style.boxShadow='0 0 0 3px var(--amber)';});
      setTimeout(()=>btns.forEach(b=>{b.style.boxShadow='';}),600);
      return;
    }
    const pasos=metodoPasos[metodoActivo];
    if(metodoPaso<pasos.length){document.getElementById(pasos[metodoPaso]).style.display='block';metodoPaso++;}
    else{cur++;show(cur,1);}
    return;
  }
  if(clicks<(s.clicks||0)){clicks++;if(s.onReveal)s.onReveal(clicks);return;}
  if(cur<SLIDES.length-1){cur++;show(cur,1);}
}
function retreat(){if(cur>0){cur--;show(cur,-1);}}

document.getElementById('fs-btn').addEventListener('click',()=>{
  if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen().catch(()=>{});
});
document.addEventListener('fullscreenchange',()=>{document.getElementById('fs-btn').textContent=document.fullscreenElement?'✕':'⛶';});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowRight'){e.preventDefault();advance();}
  if(e.code==='ArrowLeft'){e.preventDefault();retreat();}
  if(e.code==='KeyF')document.getElementById('fs-btn').click();
});
document.getElementById('bn').addEventListener('click',advance);
document.getElementById('bp').addEventListener('click',retreat);
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?advance():retreat();}});
setTimeout(()=>{document.getElementById('hint').style.opacity='0';},5000);
document.addEventListener('katex-ready',()=>{const a=deck.querySelector('.slide.active');if(a)doKatex(a);});
show(0,1);
</script>
